query DonationStatistics {
  donationStatistics {
    flaggedItems
    pendingApprovals
    totalActiveDonations
  }
}

query DonationDetail($id: ID!) {
  donation(id: $id) {
    id
    title
    description
    status
    urgency
    quantity
    category {
      id
      name
      sensitivity
    }
    categoryId
    location {
      id
      city
      country
      neighborhood
      latitude
      longitude
    }
    locationId
    mainAttachment {
      id
      url
      fileName
      fileType
    }
    mainAttachmentId
    attachmentIds
    safetyChecklistCompleted
    specification
    createdAt
    updatedAt
    expiryDate
    listingExpiresAt
    publishedAt
    userId
    user {
      id
      displayName
      email
      avatar {
        id
        url
      }
    }
  }
}

query DonationFilterCategories($pagination: PaginationInput) {
  categories(pagination: $pagination) {
    hasNextPage
    hasPreviousPage
    limit
    page
    totalCount
    items {
      id
      name
      sensitivity
    }
  }
}

query Donations($filter: DonationsFilterInput, $pagination: PaginationInput) {
  donations(filter: $filter, pagination: $pagination) {
    hasNextPage
    hasPreviousPage
    limit
    page
    totalCount
    items {
      id
      title
      description
      status
      urgency
      quantity
      category {
        id
        name
        sensitivity
      }
      location {
        id
        city
        country
        neighborhood
      }
      mainAttachment {
        id
        url
      }
      mainAttachmentId
      attachmentIds
      safetyChecklistCompleted
      specification
      createdAt
      updatedAt
      expiryDate
      listingExpiresAt
      publishedAt
      userId
      user {
        id
        displayName
        email
      }
    }
  }
}

mutation CreateDonation($input: CreateDonationInput!) {
  createDonation(input: $input) {
    id
    title
    status
    createdAt
  }
}

mutation DeleteDonation($id: ID!) {
  deleteDonation(id: $id) {
    message
  }
}
