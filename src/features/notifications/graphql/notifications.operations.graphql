query Notifications($pagination: PaginationQueryInput) {
  getNotifications(pagination: $pagination) {
    hasNextPage
    hasPreviousPage
    limit
    page
    totalCount
    items {
      id
      title
      body
      type
      isRead
      receiverId
      meta
      createdAt
      updatedAt
    }
  }
}

mutation MarkNotificationsAsRead($input: UpdateReadNotificationsInput!) {
  markNotificationsAsRead(input: $input) {
    message
  }
}

mutation DeleteNotification($id: ID!) {
  deleteNotification(id: $id) {
    message
  }
}
