query AdminDashboardStats($input: AdminDashboardStatsInput) {
  adminDashboardStats(input: $input) {
    activeUsers
    activeUsersIncrease
    co2SavedKg
    co2SavedKgIncrease
    foodSavedKg
    foodSavedKgIncrease
    totalDonations
    totalDonationsIncrease
  }
}

query DonationsHeatmap($input: DonationsHeatmapInput!) {
  donationsHeatmap(input: $input) {
    maxScore
    totalCells
    cells {
      lat
      lng
      score
      rawScore
      donationCount
      activeCount
      completedCount
      reservationCount
      userCount
      city
      neighborhood
      topCategory
    }
  }
}
