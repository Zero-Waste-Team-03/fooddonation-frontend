mutation Login($loginInput: LoginInput!) {
  login(loginInput: $loginInput) {
    accessToken
    refreshToken
    user {
      id
      email
      role
      displayName
    }
  }
}

query CurrentUser {
  currentUser {
    id
    displayName
    email
    avatarAttachmentId
    description
    reputationScore
    role
    status
    isMailVerified
    lastChangedPasswordDate
    createdAt
    updatedAt
    location {
      id
      city
      country
      latitude
      longitude
      neighborhood
    }
    settings {
      id
      appearance
      isNewDonationsAlertsEnabled
      isSystemReports
      isUrgentAlertsEnabled
      userId
    }
  }
}
